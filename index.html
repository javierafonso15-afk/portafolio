<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<title>Cuestionario para la princesita</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#ffd6e7,#ffc2d1);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
width:100%;
max-width:900px;
background:white;
border-radius:25px;
padding:25px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
text-align:center;
color:#ff2f7d;
margin-bottom:10px;
font-size:2.2rem;
}

.subtitle{
text-align:center;
color:#ff5c93;
margin-bottom:25px;
font-weight:bold;
}

.progress{
width:100%;
height:12px;
background:#ffe0ea;
border-radius:20px;
overflow:hidden;
margin-bottom:20px;
}

.progress-bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#ff2f7d,#ff8db3);
transition:.4s;
}

#questionCounter{
font-weight:bold;
margin-bottom:20px;
color:#ff2f7d;
}

#question{
font-size:1.3rem;
font-weight:bold;
line-height:1.7;
margin-bottom:25px;
color:#ff2f7d;
}

.answers{
display:flex;
flex-direction:column;
gap:15px;
}

.answer-btn{
padding:18px;
border:none;
border-radius:15px;
background:#fff0f5;
cursor:pointer;
font-size:1rem;
text-align:left;
transition:.3s;
width:100%;
line-height:1.7;
color:#ff2f7d;
font-weight:bold;
}

.answer-btn:hover{
background:#ffd6e7;
}

.correct{
background:#b8f5c4 !important;
color:#0f5132 !important;
}

.wrong{
background:#ffb3b3 !important;
color:#7f1d1d !important;
}

.info{
margin-top:25px;
font-weight:bold;
color:#ff2f7d;
}

.buttons{
display:flex;
gap:10px;
margin-top:20px;
}

button{
flex:1;
padding:15px;
border:none;
border-radius:15px;
background:#ff2f7d;
color:white;
font-size:1rem;
cursor:pointer;
font-weight:bold;
}

.hidden{
display:none;
}

#result{
text-align:center;
}

#result h2{
color:#ff2f7d;
margin-bottom:20px;
}

#finalScore{
font-size:1.5rem;
color:#ff2f7d;
margin-bottom:20px;
}

@media(max-width:700px){

.buttons{
flex-direction:column;
}

h1{
font-size:1.7rem;
}

#question{
font-size:1.1rem;
}

.answer-btn{
font-size:.95rem;
}

}

</style>
</head>

<body>

<div class="container">

<div id="quizBox">

<h1>👑 Cuestionario para la princesita</h1>

<p class="subtitle">
Turismo 2025 ✨
</p>

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

<div id="questionCounter"></div>

<div id="question"></div>

<div class="answers" id="answers"></div>

<div class="info">
Puntuación: <span id="score">0</span>
</div>

<div class="buttons">

<button id="prevBtn">
⬅ Anterior
</button>

<button id="nextBtn">
Siguiente ➡
</button>

</div>

</div>

<div id="result" class="hidden">

<h2>✨ Resultado Final ✨</h2>

<div id="finalScore"></div>

<button onclick="restartQuiz()">
🔄 Reiniciar cuestionario
</button>

</div>

</div>

let currentQuestion = 0;
let score = 0;
let answeredQuestions = {};

const questionEl = document.getElementById("question");
const answersEl = document.getElementById("answers");
const scoreEl = document.getElementById("score");
const questionCounter = document.getElementById("questionCounter");
const progressBar = document.getElementById("progressBar");

function loadQuestion(){

const q = questions[currentQuestion];

questionCounter.innerHTML =
"Pregunta " + (currentQuestion + 1) +
" de " + questions.length;

progressBar.style.width =
((currentQuestion + 1) / questions.length) * 100 + "%";

questionEl.innerHTML = q.question;

answersEl.innerHTML = "";

for(let i=0;i<q.answers.length;i++){

const btn = document.createElement("button");

btn.className = "answer-btn";

btn.innerHTML = q.answers[i];

btn.onclick = function(){
selectAnswer(i,btn);
};

if(answeredQuestions[currentQuestion] !== undefined){

btn.disabled = true;

if(i === q.correct){
btn.classList.add("correct");
}

if(i === answeredQuestions[currentQuestion] &&
i !== q.correct){
btn.classList.add("wrong");
}

}

answersEl.appendChild(btn);

}

}

function selectAnswer(index,button){

if(answeredQuestions[currentQuestion] !== undefined){
return;
}

answeredQuestions[currentQuestion] = index;

const q = questions[currentQuestion];

const buttons =
document.querySelectorAll(".answer-btn");

buttons.forEach((btn,i)=>{

btn.disabled = true;

if(i === q.correct){
btn.classList.add("correct");
}

});

if(index === q.correct){

score++;
scoreEl.innerHTML = score;

}else{

button.classList.add("wrong");

}

}

document.getElementById("nextBtn").onclick = function(){

if(currentQuestion < questions.length - 1){

currentQuestion++;

loadQuestion();

}else{

showResult();

}

};

document.getElementById("prevBtn").onclick = function(){

if(currentQuestion > 0){

currentQuestion--;

loadQuestion();

}

};

function showResult(){

document.getElementById("quizBox")
.classList.add("hidden");

document.getElementById("result")
.classList.remove("hidden");

document.getElementById("finalScore")
.innerHTML =
"Has acertado " +
score +
" de " +
questions.length +
" preguntas 💖";

}

function restartQuiz(){

currentQuestion = 0;
score = 0;
answeredQuestions = {};

scoreEl.innerHTML = 0;

document.getElementById("result")
.classList.add("hidden");

document.getElementById("quizBox")
.classList.remove("hidden");

loadQuestion();

}

loadQuestion();

</script>
